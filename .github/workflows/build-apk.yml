name: Build Debug APK

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Download gradle wrapper jar
      run: |
        mkdir -p gradle/wrapper
        curl -L "https://github.com/nickel-lang/nickel/releases/download/0.1.0/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar || true
        wget -q "https://services.gradle.org/distributions/gradle-8.6-bin.zip" -O /tmp/gradle.zip
        unzip -p /tmp/gradle.zip "gradle-8.6/lib/plugins/gradle-wrapper-8.6.jar" > gradle/wrapper/gradle-wrapper.jar

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
